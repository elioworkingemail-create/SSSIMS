name: Build Android APK

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'

    - name: Install PWABuilder
      run: npm install -g @pwa/builder

    - name: Generate Android APK
      run: |
        mkdir -p dist
        pwa-builder --app ./ --out ./dist --platform android

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v3
      with:
        name: sssims-apk
        path: dist/*.apk
