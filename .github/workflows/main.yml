name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install PWABuilder
        run: npm install -g pwabuilder
        
      - name: Build APK
        run: |
          mkdir -p dist
          npx pwabuilder package --platform android --output ./dist
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: sssims-apk
          path: dist/*.apk
