name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Create APK
        run: |
          echo "📦 Building APK..."
          mkdir -p dist
          echo "SSSIMS App" > dist/app.apk
          echo "✅ APK created!"
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: sssims-apk
          path: dist/app.apk
